<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patristic Bible Lexicon</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Sans+Syriac&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Georgia', serif; background-color: #f9f7f1; color: #333; padding: 40px 20px; margin: 0; }
    h1 { text-align: center; color: #4a2e1b; margin-bottom: 30px; font-size: 2.5em; }
    
    .search-container { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto 40px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    .search-container input { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }
    #searchBook { flex: 2; width: auto; }
    
    .btn-main { padding: 12px 24px; font-size: 16px; background-color: #4a2e1b; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .flashcard-btn { display: block; margin: 0 auto 30px auto; padding: 12px 24px; background-color: #8b0000; color: white; border: none; border-radius: 5px; cursor: pointer; }
    
    .translation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
    .translation-box { background: white; padding: 25px; border-radius: 8px; border-top: 4px solid #d4c5b0; cursor: pointer; transition: transform 0.2s; }
    .translation-box:hover { transform: scale(1.01); background-color: #fffdf9; }
    .translation-box h3 { margin-top: 0; color: #666; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    
    .verse-text { font-size: 18px; line-height: 1.6; display: none; margin-top: 15px; }
    .rtl-text { direction: rtl; text-align: right; font-size: 26px; font-family: 'Amiri', serif; }
    .syriac-text { font-family: 'Noto Sans Syriac', serif; font-size: 24px; }
    .speaker-icon { font-size: 18px; vertical-align: middle; margin-left: 8px; color: #8b0000; display: none; }
  </style>
</head>
<body>

  <h1>Patristic Bible Lexicon</h1>

  <div class="search-container">
    <input type="text" id="searchBook" placeholder="Book">
    <input type="number" id="searchChapter" placeholder="Ch">
    <input type="number" id="searchVerse" placeholder="Vs">
    <button class="btn-main" onclick="searchVerse()">Search</button>
    <button class="btn-main" onclick="location.reload()" style="background-color: #666;">Clear</button>
  </div>

  <button class="flashcard-btn" onclick="showCommentary()">📖 View Church Fathers Commentary</button>

  <div class="translation-grid">
    <div class="translation-box" onclick="revealLanguage('engText', 'en-US')">
      <h3>English (NKJV) <span id="spk-engText" class="speaker-icon">🔊</span></h3>
      <p id="engText" class="verse-text">...</p>
    </div>
    <div class="translation-box" onclick="revealLanguage('grkText', 'el-GR')">
      <h3>Greek (LXX / NT) <span id="spk-grkText" class="speaker-icon">🔊</span></h3>
      <p id="grkText" class="verse-text">...</p>
    </div>
    <div class="translation-box" onclick="revealLanguage('syrText', 'he-IL')">
      <h3>Peshitta Aramaic <span id="spk-syrText" class="speaker-icon">🔊</span></h3>
      <p id="syrText" class="verse-text rtl-text syriac-text">...</p>
    </div>
    <div class="translation-box" onclick="revealLanguage('hebText', 'he-IL')">
      <h3>Hebrew <span id="spk-hebText" class="speaker-icon">🔊</span></h3>
      <p id="hebText" class="verse-text rtl-text">...</p>
    </div>
    <div class="translation-box" onclick="revealLanguage('araText', 'ar-SA')">
      <h3>Arabic (Smith & Van Dyck) <span id="spk-araText" class="speaker-icon">🔊</span></h3>
      <p id="araText" class="verse-text rtl-text">...</p>
    </div>
  </div>

  <script>
    let currentVerseData = null;

    async function searchVerse() {
      const b = document.getElementById("searchBook").value.trim();
      const c = document.getElementById("searchChapter").value.trim();
      const v = document.getElementById("searchVerse").value.trim();
      const query = `${b} ${c}:${v}`;

      try {
        const response = await fetch('bible-data.json');
        const bibleData = await response.json();
        
        if (bibleData[query]) {
          currentVerseData = bibleData[query];
          document.getElementById("engText").innerText = currentVerseData.english;
          document.getElementById("grkText").innerText = currentVerseData.greek;
          document.getElementById("syrText").innerText = currentVerseData.aramaic;
          document.getElementById("hebText").innerText = currentVerseData.hebrew;
          document.getElementById("araText").innerText = currentVerseData.arabic;
          alert("Verse Found! Click a box to reveal and hear it.");
        } else {
          alert("Verse not found. Try John 19:30");
        }
      } catch (e) { console.error(e); }
    }

    function revealLanguage(id, langCode) {
      if (!currentVerseData) return;
      document.getElementById(id).style.display = "block";
      document.getElementById("spk-" + id).style.display = "inline";

      const msg = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
      msg.lang = langCode;
      msg.rate = 0.75;
      window.speechSynthesis.speak(msg);
    }

    function showCommentary() {
      if (!currentVerseData || !currentVerseData.commentary) {
        alert("Search for a verse first.");
        return;
      }
      alert("PATRISTIC COMMENTARY:\n\n" + currentVerseData.commentary);
    }
  </script>
</body>
</html>
